<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Said It? - Trump vs Pauline Hanson</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1>Donald Trump vs Pauline Hanson</h1>
                <p class="subtitle">Who said it?</p>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <div class="start-content">
                <h2 class="start-title">Can you guess who said it?</h2>
                <div class="start-images">
                    <div class="start-image-left">
                        <img src="./donaldtrump.jpg" alt="Donald Trump">
                        <h3>Donald Trump</h3>
                    </div>
                    <div class="vs-text">VS</div>
                    <div class="start-image-right">
                        <img src="./paulinehanson.jpg" alt="Pauline Hanson">
                        <h3>Pauline Hanson</h3>
                    </div>
                </div>
                <p class="instructions">The two leaders have produced some memorable statements. Test your knowledge here so you know who said what!</p>
                <button id="startBtn" class="btn btn-primary">Start the quiz</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div class="quiz-wrapper">
                <div class="question-info">
                    <span class="question-number">Question <span id="questionNumber">1</span> of 10</span>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>

                <div class="quiz-container">
                    <div class="trump-image">
                        <img src="./donaldtrump.jpg" alt="Donald Trump">
                    </div>

                    <div class="quote-container">
                        <p id="quoteText" class="quote"></p>
                    </div>

                    <div class="pauline-image">
                        <img src="./paulinehanson.jpg" alt="Pauline Hanson">
                    </div>
                </div>

                <div class="options">
                    <button class="option-btn" data-answer="trump">
                        <span class="option-text">Donald Trump</span>
                        <span class="option-icon"></span>
                    </button>
                    <button class="option-btn" data-answer="hanson">
                        <span class="option-text">Pauline Hanson</span>
                        <span class="option-icon"></span>
                    </button>
                </div>

                <button id="revealBtn" class="btn btn-reveal">Reveal Answer</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen">
            <div class="results-content">
                <h2>Your score</h2>
                <div class="score-display">
                    <p class="final-score"><span id="finalScore">0</span>/10</p>
                </div>
                <p id="resultMessage" class="result-message"></p>
                
                <div class="results-details">
                    <div class="detail-box">
                        <p class="detail-label">Correct answers</p>
                        <p class="detail-value" id="correctCount">0</p>
                    </div>
                    <div class="detail-box">
                        <p class="detail-label">Accuracy</p>
                        <p class="detail-value" id="accuracy">0%</p>
                    </div>
                </div>

                <button id="retakeBtn" class="btn btn-primary">Retake the quiz</button>
            </div>
        </div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
