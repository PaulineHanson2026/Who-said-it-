<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Said It? - Trump vs Pauline Hanson</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1>Who said it?</h1>
                <p class="subtitle">Trump vs Pauline Hanson</p>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="startScreen" class="screen active">
            <div class="start-content">
                <p class="instructions">Can you guess who said these inflammatory statements? Test your knowledge of the controversial quotes from Donald Trump and Pauline Hanson.</p>
                <button id="startBtn" class="btn btn-primary">Start the quiz</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div class="quiz-wrapper">
                <div class="question-info">
                    <span class="question-number">Question <span id="questionNumber">1</span> of 10</span>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>

                <div class="quiz-container">
                    <div class="trump-image">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnOaBKMdg6IH2OELbGUSNWYGWjpOpqiFb8UorQUAv_3Q&s=10" alt="Donald Trump">
                    </div>

                    <div class="quote-container">
                        <p id="quoteText" class="quote"></p>
                    </div>

                    <div class="pauline-image">
                        <img src="https://static.ffx.io/images/$zoom_0.1206%2C$multiply_4%2C$ratio_1%2C$width_378%2C$x_84%2C$y_0/t_crop_custom/c_scale%2Cw_620%2Cq_88%2Cf_auto/664a4dc0ba59ae340955d927b87affb9a7bd22c1" alt="Pauline Hanson">
                    </div>
                </div>

                <div class="options">
                    <button class="option-btn" data-answer="trump">
                        <span>Donald Trump</span>
                    </button>
                    <button class="option-btn" data-answer="hanson">
                        <span>Pauline Hanson</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen">
            <div class="results-content">
                <h2>Your score</h2>
                <div class="score-display">
                    <p class="final-score"><span id="finalScore">0</span>/10</p>
                </div>
                <p id="resultMessage" class="result-message"></p>
                
                <div class="results-details">
                    <div class="detail-box">
                        <p class="detail-label">Correct answers</p>
                        <p class="detail-value" id="correctCount">0</p>
                    </div>
                    <div class="detail-box">
                        <p class="detail-label">Accuracy</p>
                        <p class="detail-value" id="accuracy">0%</p>
                    </div>
                </div>

                <button id="retakeBtn" class="btn btn-primary">Retake the quiz</button>
            </div>
        </div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
